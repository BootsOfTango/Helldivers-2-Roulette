name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published, prereleased]
  workflow_dispatch:

jobs:
  item-catalog-maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate catalog/default/image consistency
        run: python scripts/validate_item_catalog.py
